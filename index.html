<!-- GAME SCRIPT (FIXED + CLEAN) -->
<script>
document.addEventListener("DOMContentLoaded", () => {

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;

  const note = {
    x: 80,
    y: canvas.height - 100,
    width: 30,
    height: 30,
    velocity: 0,
    jump: -12,
    grounded: true
  };

  const gravity = 0.6;
  let obstacles = [];
  let points = [];
  let score = 0;
  let gameOver = false;
  const targetScore = 5;

  function jump() {
    if (note.grounded && !gameOver) {
      note.velocity = note.jump;
      note.grounded = false;
    }
  }

  document.addEventListener("keydown", e => {
    if (e.code === "Space") jump();
    if (e.key === "r") location.reload();
  });

  document.addEventListener("touchstart", jump);

  function drawNote() {
    ctx.fillStyle = "#ff8c42";
    ctx.fillRect(note.x, note.y, note.width, note.height);
  }

  function drawOb(o) {
    ctx.fillStyle = "#e63946";
    ctx.fillRect(o.x, o.y, 30, 30);
  }

  function drawPt(p) {
    ctx.fillStyle = "#2d9d4d";
    ctx.fillRect(p.x, p.y, 20, 20);
  }

  function collision(a, b) {
    return a.x < b.x + 30 &&
           a.x + a.width > b.x &&
           a.y < b.y + 30 &&
           a.y + a.height > b.y;
  }

  function loop() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // gravity
    note.velocity += gravity;
    note.y += note.velocity;

    if (note.y >= canvas.height - 60) {
      note.y = canvas.height - 60;
      note.velocity = 0;
      note.grounded = true;
    }

    // spawn
    if (Math.random() < 0.02) {
      obstacles.push({ x: canvas.width, y: canvas.height - 60 });
    }

    if (Math.random() < 0.015) {
      points.push({ x: canvas.width, y: canvas.height - 120 });
    }

    // update obstacles
    obstacles.forEach(o => o.x -= 4);
    points.forEach(p => p.x -= 4);

    // draw
    drawNote();
    obstacles.forEach(drawOb);
    points.forEach(drawPt);

    // collisions
    obstacles.forEach(o => {
      if (collision(note, o)) gameOver = true;
    });

    points.forEach((p, i) => {
      if (collision(note, p)) {
        score++;
        points.splice(i, 1);
        document.getElementById("score-text").innerText = score;
      }
    });

    if (score >= targetScore) {
      document.querySelector(".game-screen").style.display = "none";
      localStorage.setItem("beeryanisGameCompleted", "true");
    }

    if (!gameOver) requestAnimationFrame(loop);
  }

  loop();

});
</script>

</body>
